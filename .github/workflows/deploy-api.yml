name: Deploy MakySchool API

on:
  workflow_dispatch:
    # Manual trigger only — no auto-deploy to production

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r apps/api/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 apps/api/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Runtime startup check
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/makyschool"
          AUTH_JWT_SECRET: "dummy-secret-for-ci"
          PYTHONPATH: "apps/api"
        run: |
          mkdir -p /tmp/isolated-validation
          cp -r apps/api/* /tmp/isolated-validation/
          cd /tmp/isolated-validation
          python -c "from main import app; print('✅ App imported successfully')"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "apps/api/"
          target: "/root/makyschool-api"
          strip_components: 2

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        env:
          APP_ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: APP_ENV_FILE
          script: |
            PROJECT_DIR="/root/makyschool-api"
            cd $PROJECT_DIR

            echo "$APP_ENV_FILE" > .env

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
                curl -fsSL https://get.docker.com | sh
            fi

            # Detect Docker Compose
            COMPOSE_CMD=""
            if docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
                COMPOSE_CMD="docker-compose"
            else
                curl -L "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                chmod +x /usr/local/bin/docker-compose
                COMPOSE_CMD="docker-compose"
            fi

            $COMPOSE_CMD down || true
            $COMPOSE_CMD up -d --build

            echo "Waiting for API to start..."
            sleep 10

            if docker ps | grep -q makyschool-api; then
                echo "✅ Container is running"
                curl -sf http://localhost:4000/api/v1/ || echo "API still warming up..."
                exit 0
            else
                echo "❌ Container failed to start"
                $COMPOSE_CMD logs --tail=50
                exit 1
            fi
